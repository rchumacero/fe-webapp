version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=${API_URL:-http://localhost:3000/api}
    restart: always

  # Add more services as needed (e.g., mobile-web, storybook, etc.)
